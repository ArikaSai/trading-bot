<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL Backtest Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1019;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e2e8f0;--dim:rgba(255,255,255,0.4);--accent:#818cf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif}
.mono{font-family:'JetBrains Mono',Menlo,Consolas,monospace}.container{max-width:1200px;margin:0 auto;padding:16px}
.upload-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.upload-box{text-align:center;padding:40px}
.upload-btn{background:rgba(129,140,252,0.15);color:var(--accent);border:1px solid rgba(129,140,252,0.3);padding:12px 32px;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
.upload-btn:hover{background:rgba(129,140,252,0.25)}
.header{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.header h1{font-size:18px;font-weight:700}
.header .meta{font-size:12px;opacity:0.3}
.change-btn{margin-left:auto;font-size:12px;padding:4px 12px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--dim);cursor:pointer}
.date-bar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:20px;padding:12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
.date-bar label{font-size:11px;opacity:0.5;text-transform:uppercase;letter-spacing:1px}
.date-bar input[type=date]{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:4px 8px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace}
.date-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.date-bar .info{font-size:12px;opacity:0.3}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.stat-card{padding:12px;border-radius:8px;background:var(--card);border:1px solid var(--border)}
.stat-card .label{font-size:10px;opacity:0.5;text-transform:uppercase;letter-spacing:1px}
.stat-card .value{font-size:20px;font-weight:700;margin-top:4px}
.stat-card .sub{font-size:10px;opacity:0.4;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--dim);transition:all 0.2s}
.tab.active{background:rgba(165,180,252,0.15);color:var(--accent);border-color:rgba(165,180,252,0.3)}
.panel{background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.06);padding:16px;margin-bottom:16px}
.panel-title{font-size:11px;opacity:0.4;margin-bottom:12px}
.tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.tables-grid{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:4px 8px;opacity:0.4;border-bottom:1px solid rgba(255,255,255,0.1)}
th.r{text-align:right}td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04)}td.r{text-align:right}
.footer{text-align:center;margin-top:24px;font-size:11px;opacity:0.2}
.empty{text-align:center;padding:80px 0;opacity:0.4}
</style>
</head>
<body>
<div id="upload-screen" class="upload-screen">
  <div class="upload-box">
    <div class="mono" style="font-size:28px;margin-bottom:8px">SOL Backtest</div>
    <div style="font-size:14px;opacity:0.4;margin-bottom:32px">上傳 CSV 開始回測</div>
    <input type="file" id="file-input" accept=".csv" style="display:none">
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">選擇 CSV 檔案</button>
    <div class="mono" style="font-size:11px;opacity:0.25;margin-top:24px">需要欄位: timestamp, open, high, low, close, volume, ATR, RSI, EMA, ADX, BB_Mid</div>
  </div>
</div>
<div id="dashboard" class="container" style="display:none">
  <div class="header">
    <div class="dot"></div><h1 class="mono">SOL/USDT Backtest</h1>
    <span class="meta mono" id="file-meta"></span>
    <button class="change-btn" onclick="location.reload()">換檔案</button>
  </div>
  <div class="date-bar">
    <label>日期區間</label>
    <input type="date" id="start-date"><span style="opacity:0.3">→</span><input type="date" id="end-date">
    <span style="opacity:0.15;margin:0 4px">│</span>
    <label>初始資金</label>
    <input type="number" id="initial-cap" value="700" min="1" step="100"
      style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:4px 8px;color:#e2e8f0;font-size:13px;font-family:'JetBrains Mono',monospace;width:110px">
    <span style="opacity:0.3;font-size:12px">U</span>
    <span class="info mono" id="range-info"></span>
  </div>
  <div class="stats" id="stats-grid"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tab-equity" class="panel" style="display:none"><div class="panel-title mono" id="eq-title"></div><canvas id="chart-equity"></canvas></div>
  <div id="tab-monthly" class="panel" style="display:none"><div class="panel-title mono">MONTHLY PnL (USDT)</div><canvas id="chart-monthly"></canvas></div>
  <div id="tab-rdist" class="panel" style="display:none"><div class="panel-title mono" id="rdist-title"></div><canvas id="chart-rdist"></canvas></div>
  <div id="tab-trades" style="display:none"><div class="tables-grid">
    <div class="panel"><div class="panel-title mono" style="color:#4ade80">TOP 10 WINS</div><table id="table-wins"></table></div>
    <div class="panel"><div class="panel-title mono" style="color:#f87171">TOP 10 LOSSES</div><table id="table-losses"></table></div>
  </div></div>
  <div class="panel"><div class="panel-title mono">SOL/USDT DAILY PRICE + EMA200</div><canvas id="chart-price"></canvas></div>
  <div class="footer mono">SOL Trend Strategy — Backtest by 家堡</div>
</div>
<script>
const CFG={risk_per_trade:.1,max_pos_ratio:.5,leverage:8,max_trade_usdt_cap:200000,max_consec_losses:3,fee_rate:.0005,mmr:.005,initial_capital:700,adx_threshold:15,trailing_atr:4,initial_sl_atr:1.5,slippage:.001,max_position_cap:40000000};

function runBacktest(rows){
const{risk_per_trade,max_pos_ratio,leverage,max_trade_usdt_cap,max_consec_losses,
  fee_rate,mmr,initial_capital,adx_threshold,trailing_atr:trailAtr,initial_sl_atr,
  slippage,max_position_cap}=CFG;
let cap=initial_capital,pos=0,ep=0,sz=0,liq=0,ir=0,et=null,sl=0,tsl=0,hp=0,lp=Infinity;
let cL=0,skip=false,inSZ=false,beA=false,eFee=0;
// TWAP state
let twA=false,twR=0,twSz=0,twDir=0,twSl=0,twFP=false;
const cH=[],cLw=[],CN=8,trades=[],equity=[];

for(let i=0;i<rows.length;i++){
const r=rows[i],{open:O,high:H,low:L,close:C,ATR,RSI,EMA,ADX,BB_Mid,timestamp:T}=r;
cH.push(H);cLw.push(L);if(cH.length>CN){cH.shift();cLw.shift();}
if(cap<5){equity.push({t:T,v:0});continue;}

// ── TWAP first sub-order (next bar after signal) ──
if(pos===0&&twA&&twFP){
  const d=twSl;
  const subEp=twDir===1?O*(1+slippage):O*(1-slippage);
  eFee=twSz*subEp*fee_rate;
  cap-=eFee;
  pos=twDir; sz=twSz; ep=subEp; et=T;
  sl=pos===1?ep-d:ep+d; tsl=sl;
  hp=O; lp=O;
  liq=pos===1?ep*(1-1/leverage+mmr):ep*(1+1/leverage-mmr);
  beA=false; twR--; twFP=false;
}
// ── TWAP subsequent sub-orders ──
else if(pos!==0&&twA&&twR>0&&!twFP&&pos===twDir){
  const subEp=pos===1?O*(1+slippage):O*(1-slippage);
  const subFee=twSz*subEp*fee_rate;
  cap-=subFee; eFee+=subFee;
  const totalSz=sz+twSz;
  ep=(ep*sz+subEp*twSz)/totalSz;
  sz=totalSz;
  liq=pos===1?ep*(1-1/leverage+mmr):ep*(1+1/leverage-mmr);
  twR--;
}
if(twA&&twR===0&&!twFP) twA=false;

// ── Consolidation tightening ──
let eff=trailAtr;
if(pos!==0&&cH.length===CN&&ATR>0&&(Math.max(...cH)-Math.min(...cLw))<1.25*ATR)eff=1.0;

// ── Spike filter + trailing stop ──
const spike=ATR>0&&(H-L)>4*ATR;
const rH=(spike&&pos===1)?C:H,rL=(spike&&pos===-1)?C:L;
if(pos===1){hp=Math.max(hp,rH);tsl=Math.max(tsl,hp-eff*ATR);}
else if(pos===-1){lp=Math.min(lp,rL);tsl=Math.min(tsl,lp+eff*ATR);}

// ── 2.0R breakeven ──
if(!beA&&pos!==0){const sd2=Math.abs(ep-sl);
if(pos===1&&H>=ep+2*sd2){tsl=Math.max(tsl,ep/((1-fee_rate)*(1-slippage)));beA=true;}
else if(pos===-1&&L<=ep-2*sd2){tsl=Math.min(tsl,ep/((1+fee_rate)*(1+slippage)));beA=true;}}

// ── Exit check ──
let closed=false,xp=0,pnl=0,reason="";
if(pos===1){
if(L<=liq){xp=liq*(1-slippage);pnl=(xp-ep)*sz-sz*xp*fee_rate;closed=true;reason="Liquidation";}
else if(L<=tsl||L<=sl){const iT=L<=tsl;xp=Math.max(iT?tsl:sl,O)*(1-slippage);pnl=(xp-ep)*sz-sz*xp*fee_rate;closed=true;reason=iT?"Trailing":"Stop_Loss";}}
else if(pos===-1){
if(H>=liq){xp=liq*(1+slippage);pnl=(ep-xp)*sz-sz*xp*fee_rate;closed=true;reason="Liquidation";}
else if(H>=tsl||H>=sl){const iT=H>=tsl;xp=Math.min(iT?tsl:sl,O)*(1+slippage);pnl=(ep-xp)*sz-sz*xp*fee_rate;closed=true;reason=iT?"Trailing":"Stop_Loss";}}
if(closed){
  cap=reason==="Liquidation"?Math.max(0,cap+pnl):cap+pnl;
  const net=pnl-eFee;
  trades.push({entryTime:et,exitTime:T,type:pos===1?"Long":"Short",pnl:+net.toFixed(2),r:+(ir>0?net/ir:0).toFixed(3),capital:+cap.toFixed(2),reason});
  pos=0;sz=0;beA=false;eFee=0;twA=false;twR=0;twFP=false;cH.length=0;cLw.length=0;
  if(net<0){cL++;if(cL>=max_consec_losses){skip=true;inSZ=false;cL=0;}}else cL=0;}

// ── Signal detection + TWAP setup ──
if(pos===0&&!twA){
  const lC=ADX>adx_threshold&&C>EMA&&C>BB_Mid&&RSI<58;
  const sC=ADX>adx_threshold&&C<EMA&&C<BB_Mid&&RSI>42;
  if(skip){if(lC||sC){skip=false;inSZ=true;}}
  else if(inSZ){if(!lC&&!sC)inSZ=false;}
  else if(lC||sC){
    const d=Math.max(initial_sl_atr*ATR,O*.001);
    const dir=lC?1:-1;
    const N=Math.min(Math.max(1,Math.floor(cap/max_trade_usdt_cap)),Math.floor(max_position_cap/max_trade_usdt_cap));
    let szEach;
    if(N===1){szEach=Math.min((cap*risk_per_trade)/d,(cap*max_pos_ratio*leverage)/O,max_trade_usdt_cap/O);}
    else{szEach=max_trade_usdt_cap/O;}
    ir=N*szEach*d;
    twSz=szEach;twSl=d;twDir=dir;twA=true;twR=N;twFP=true;
  }}

const unr=pos!==0?(C-ep)*sz*pos:0;
equity.push({t:T,v:+(cap+unr).toFixed(2)});}
return{trades,equity};}

function computeStats(trades,equity){
if(!trades.length)return null;
const fc=equity[equity.length-1].v,wins=trades.filter(t=>t.pnl>0).length;
let pk=equity[0].v,mdd=0;for(const e of equity){pk=Math.max(pk,e.v);mdd=Math.min(mdd,(e.v-pk)/pk);}
const dm={};for(const e of equity)dm[e.t.slice(0,10)]=e.v;
const dv=Object.values(dm),dr=[];for(let i=1;i<dv.length;i++)if(dv[i-1]>0)dr.push((dv[i]-dv[i-1])/dv[i-1]);
const mn=dr.reduce((a,b)=>a+b,0)/(dr.length||1),sd=Math.sqrt(dr.reduce((a,b)=>a+(b-mn)**2,0)/(dr.length||1));
const sh=sd>0?(mn/sd)*Math.sqrt(365):0;
let mxW=0,mxL=0,c=0;for(const t of trades){if(t.pnl>0){c=c>0?c+1:1;mxW=Math.max(mxW,c);}else{c=c<0?c-1:-1;mxL=Math.max(mxL,Math.abs(c));}}
const mm={};for(const t of trades){const m=t.exitTime.slice(0,7);mm[m]=(mm[m]||0)+t.pnl;}
const monthly=Object.entries(mm).sort().map(([m,p])=>({month:m,pnl:+p.toFixed(2)}));
const rb={};for(let b=-3;b<=7.5;b+=.5)rb[b]=0;
for(const t of trades){const b=Math.max(-3,Math.min(7,Math.floor(t.r*2)/2));rb[b]=(rb[b]||0)+1;}
const rDist=Object.entries(rb).filter(([,c])=>c>0).map(([r,c])=>({r:+r,count:c}));
const sorted=[...trades].sort((a,b)=>a.pnl-b.pnl);
return{fc:+fc.toFixed(2),ret:+((fc-CFG.initial_capital)/CFG.initial_capital*100).toFixed(2),n:trades.length,wins,losses:trades.length-wins,
wr:+(wins/trades.length*100).toFixed(2),avgR:+(trades.reduce((a,t)=>a+t.r,0)/trades.length).toFixed(3),
mdd:+(mdd*100).toFixed(2),sh:+sh.toFixed(3),mxW,mxL,monthly,rDist,best:sorted.slice(-10).reverse(),worst:sorted.slice(0,10)};}

const cMap={};
function mk(id,cfg){if(cMap[id])cMap[id].destroy();cMap[id]=new Chart(document.getElementById(id),cfg);}
const fmt=n=>{if(n==null)return"--";if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+"M";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+"K";return typeof n==='number'?n.toFixed(2):n;};
Chart.defaults.color='rgba(255,255,255,0.3)';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
Chart.defaults.font.family="'JetBrains Mono',monospace";Chart.defaults.font.size=11;

let allRows=null,currentTab='equity';

function render(){
CFG.initial_capital=Math.max(1,+(document.getElementById('initial-cap').value)||700);
const sd=document.getElementById('start-date').value,ed=document.getElementById('end-date').value;
const filtered=allRows.filter(r=>r.timestamp>=sd&&r.timestamp<=ed+"T23:59:59");
if(filtered.length<50){document.getElementById('stats-grid').innerHTML='<div class="empty">資料不足（需要 50+ bars）</div>';return;}
const{trades,equity}=runBacktest(filtered);const s=computeStats(trades,equity);if(!s)return;
document.getElementById('range-info').textContent=filtered.length.toLocaleString()+' bars · '+s.n+' trades';
const mddC=s.mdd>-20?'#4ade80':s.mdd>-40?'#fbbf24':'#f87171';
document.getElementById('stats-grid').innerHTML=[
['Initial',fmt(CFG.initial_capital)+' U','','#e2e8f0'],['Final',fmt(s.fc)+' U','','#4ade80'],
['Return',fmt(s.ret)+'%','','#4ade80'],['Sharpe',s.sh.toFixed(3),'','#a5b4fc'],
['Max DD',s.mdd.toFixed(2)+'%','',mddC],['Win Rate',s.wr+'%',s.wins+'W / '+s.losses+'L','#e2e8f0'],
['Avg R',s.avgR.toFixed(3),'','#fbbf24'],['Trades',s.n,'Streak: +'+s.mxW+' / -'+s.mxL,'#e2e8f0'],
].map(([l,v,sub,c])=>'<div class="stat-card"><div class="label">'+l+'</div><div class="value mono" style="color:'+c+'">'+v+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>').join('');

document.getElementById('tabs').innerHTML=[['equity','Equity Curve'],['monthly','Monthly PnL'],['rdist','R Distribution'],['trades','Top Trades']].map(([k,v])=>
'<button class="tab'+(currentTab===k?' active':'')+'" onclick="switchTab(\''+k+'\')">'+v+'</button>').join('');
['equity','monthly','rdist','trades'].forEach(k=>{const el=document.getElementById('tab-'+k);if(el)el.style.display=currentTab===k?'':'none';});

const dm={};for(const e of equity)dm[e.t.slice(0,10)]=e.v;const de=Object.entries(dm);
document.getElementById('eq-title').textContent='EQUITY CURVE (Log) — '+fmt(CFG.initial_capital)+' U → '+fmt(s.fc)+' U';
mk('chart-equity',{type:'line',data:{labels:de.map(([t])=>t.slice(2,7)),datasets:[{data:de.map(([,v])=>v),borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,0.1)',fill:true,pointRadius:0,borderWidth:1.5,tension:.1}]},
options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'Equity: '+fmt(c.raw)}}},scales:{y:{type:'logarithmic',ticks:{callback:v=>fmt(v)}},x:{ticks:{maxTicksLimit:12}}}}});

mk('chart-monthly',{type:'bar',data:{labels:s.monthly.map(m=>m.month),datasets:[{data:s.monthly.map(m=>m.pnl),backgroundColor:s.monthly.map(m=>m.pnl>=0?'rgba(74,222,128,0.7)':'rgba(248,113,113,0.7)'),borderRadius:3}]},
options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)+' U'}}},scales:{y:{ticks:{callback:v=>fmt(v)}}}}});

document.getElementById('rdist-title').textContent='R-MULTIPLE DISTRIBUTION — Avg R: '+s.avgR;
mk('chart-rdist',{type:'bar',data:{labels:s.rDist.map(r=>r.r+'R'),datasets:[{data:s.rDist.map(r=>r.count),backgroundColor:s.rDist.map(r=>r.r>=0?'rgba(129,140,248,0.7)':'rgba(248,113,113,0.7)'),borderRadius:3}]},
options:{responsive:true,plugins:{legend:{display:false}}}});

function renderTable(id,arr,color){
document.getElementById(id).innerHTML='<thead><tr><th>Date</th><th>Type</th><th class="r">PnL</th><th class="r">R</th></tr></thead><tbody>'+
arr.map(t=>'<tr><td class="mono" style="opacity:0.6">'+(t.entryTime||'').slice(5,16)+'</td><td style="color:'+(t.type==='Long'?'#4ade80':'#f87171')+'">'+t.type+'</td><td class="r mono" style="color:'+color+'">'+(t.pnl>=0?'+':'')+fmt(t.pnl)+'</td><td class="r mono" style="color:'+(t.r>=0?'#4ade80':'#f87171')+'">'+t.r.toFixed(1)+'R</td></tr>').join('')+'</tbody>';}
renderTable('table-wins',s.best,'#4ade80');renderTable('table-losses',s.worst,'#f87171');

const pm={};for(const r of filtered){const d=r.timestamp.slice(0,10);
if(!pm[d])pm[d]={close:r.close,ema:r.EMA};else{pm[d].close=r.close;pm[d].ema=r.EMA;}}
const pd=Object.entries(pm);
mk('chart-price',{type:'line',data:{labels:pd.map(([t])=>t.slice(2,7)),datasets:[
{label:'Close',data:pd.map(([,v])=>v.close),borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,0.08)',fill:true,pointRadius:0,borderWidth:1.2,tension:.1},
{label:'EMA200',data:pd.map(([,v])=>v.ema),borderColor:'#818cf8',borderDash:[4,2],pointRadius:0,borderWidth:1,fill:false,tension:.1}]},
options:{responsive:true,plugins:{legend:{labels:{boxWidth:12,padding:16}}},scales:{x:{ticks:{maxTicksLimit:12}}}}});}

function switchTab(t){currentTab=t;render();}
window.switchTab=switchTab;

document.getElementById('file-input').addEventListener('change',function(e){
const file=e.target.files[0];if(!file)return;
Papa.parse(file,{header:true,dynamicTyping:true,skipEmptyLines:true,complete:function(result){
allRows=result.data.filter(r=>r.timestamp&&r.open!=null)
.map(r=>({timestamp:r.timestamp,open:+r.open,high:+r.high,low:+r.low,close:+r.close,volume:+r.volume,ATR:+r.ATR,RSI:+r.RSI,EMA:+r.EMA,ADX:+r.ADX,BB_Mid:+r.BB_Mid}))
.filter(r=>!isNaN(r.ATR)&&!isNaN(r.RSI));
if(allRows.length>1) allRows=allRows.slice(0,-1); // 移除最後一根未收盤 K 棒（對齊 Python df.iloc[:-1]）
if(!allRows.length){alert('CSV 解析失敗，請確認欄位格式');return;}
const first=allRows[0].timestamp.slice(0,10),last=allRows[allRows.length-1].timestamp.slice(0,10);
const si=document.getElementById('start-date'),ei=document.getElementById('end-date');
si.min=ei.min=first;si.max=ei.max=last;si.value=first;ei.value=last;
document.getElementById('file-meta').textContent=file.name+' · '+allRows.length.toLocaleString()+' bars';
document.getElementById('upload-screen').style.display='none';
document.getElementById('dashboard').style.display='';render();}});});
document.getElementById('start-date').addEventListener('change',()=>{if(allRows)render();});
document.getElementById('end-date').addEventListener('change',()=>{if(allRows)render();});
document.getElementById('initial-cap').addEventListener('change',()=>{if(allRows)render();});
</script>
</body>
</html>
